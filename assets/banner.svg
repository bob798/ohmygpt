<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-label="ohmygpt — a from-scratch Chinese LLM">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#15213f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="0.5" stop-color="#4ea1ff"/>
      <stop offset="1" stop-color="#39e0c8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- subtle token grid -->
  <g opacity="0.12" stroke="#4ea1ff" stroke-width="1">
    <line x1="0" y1="75" x2="1200" y2="75"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="225" x2="1200" y2="225"/>
  </g>

  <!-- attention-style node graph on the right -->
  <g transform="translate(910,150)" opacity="0.9">
    <g stroke="url(#accent)" stroke-width="2" opacity="0.5">
      <line x1="-120" y1="-80" x2="0" y2="0"/>
      <line x1="-120" y1="0"   x2="0" y2="0"/>
      <line x1="-120" y1="80"  x2="0" y2="0"/>
      <line x1="0" y1="0" x2="120" y2="-60"/>
      <line x1="0" y1="0" x2="120" y2="0"/>
      <line x1="0" y1="0" x2="120" y2="60"/>
    </g>
    <g fill="#4ea1ff">
      <circle cx="-120" cy="-80" r="9"/>
      <circle cx="-120" cy="0"   r="9"/>
      <circle cx="-120" cy="80"  r="9"/>
      <circle cx="120" cy="-60"  r="9" fill="#39e0c8"/>
      <circle cx="120" cy="0"    r="9" fill="#39e0c8"/>
      <circle cx="120" cy="60"   r="9" fill="#39e0c8"/>
    </g>
    <circle cx="0" cy="0" r="16" fill="#7c5cff"/>
  </g>

  <!-- wordmark -->
  <text x="90" y="150" font-family="'SF Mono','JetBrains Mono',Menlo,monospace" font-size="84" font-weight="700" fill="#ffffff">
    ohmy<tspan fill="url(#accent)">gpt</tspan>
  </text>
  <text x="94" y="200" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="26" fill="#9fb3d1">
    从 0 到 1 手写的中文小型大语言模型 · a from-scratch Chinese LLM
  </text>
  <text x="94" y="238" font-family="'SF Mono',Menlo,monospace" font-size="18" fill="#6f86ad">
    RMSNorm · RoPE · GQA · SwiGLU   |   tokenizer → pretrain → SFT
  </text>
</svg>
